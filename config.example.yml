# Beacon 控制面自身配置样例（非"配置中心"业务配置）。由 internal/config 加载，环境变量覆盖优先。
# 首次启动会自动释放为 config.yml 并就地填入随机强鉴权口令/密钥（开箱即跑、config.yml 即真源）；
# 此入库样例文件的敏感项保持留空、不写入凭据。生效优先级：真实环境变量 > 当前目录 .env > config.yml。
#
# 【热改项降为首启种子】（FR-61，见 docs/adr/0038）：health.* / metric.* / longpoll.max-hold-ms /
# alert.webhook.* / log.level 这些运维调参项的真源已从本文件移到 DB 设置 store。本文件对它们仅作
# "出厂默认 / 首启种子"——只在 store 还没该项时（首次启动）生效；store 一旦 seed，改本文件这些项不再
# 影响运行值，要改请走管理台设置页 / 设置 API（PUT /admin/v1/settings/{key}），改完即热生效、免重启。
# 启动 / 安全项（http-addr / database.* / auth.* / agent-token / git-export.*）仍以本文件 + env 为真源、改后须重启。

# API 与管理台 UI 的监听地址（二者同端口）
http-addr: ":8848"

# agent 端共享 token，仅防误连（非安全边界）。需与各 agent 的 bootstrap-token 一致；
# 默认固定值与 agent 样例开箱匹配，可直接改本项，或用环境变量 BEACON_BOOTSTRAP_TOKEN 覆盖
agent-token: "beacon-bootstrap-token"

# 管理面鉴权（FR-11，单操作者模型，见 docs/adr/0009）。口令与密钥为敏感项，走环境变量，勿写入此文件
auth:
  # 管理台操作者用户名
  username: "admin"
  # 管理台操作者口令；此样例留空，首启释放 config.yml 时自动填入随机强值（可改本项，或用 env BEACON_ADMIN_PASSWORD 覆盖）
  password: ""
  # 登录令牌 HMAC 签名密钥；此样例留空，首启释放 config.yml 时自动填入随机强值（可改本项，或用 env BEACON_AUTH_SECRET 覆盖）
  secret: ""
  # 登录令牌有效期（秒），默认 86400（一天）
  token-ttl-sec: 86400

database:
  # 数据库驱动：sqlite（默认，本地零依赖、单文件库，开箱即跑）或 mysql（生产）。切库只改本段，业务代码零改
  driver: "sqlite"
  # GORM DSN。sqlite 用文件路径（如 beacon.db，相对当前目录）；
  # mysql 用 user:pwd@tcp(host:3306)/db?charset=utf8mb4&parseTime=true&loc=UTC（必须带 parseTime=true&loc=UTC）
  dsn: "beacon.db"
  # 连接池最大打开连接数（sqlite 建议 1；mysql 建议 ~20）
  max-open-conns: 1
  # 连接池最大空闲连接数（sqlite 建议 1；mysql 建议 ~10）
  max-idle-conns: 1
  # 单个连接最大存活秒数
  conn-max-lifetime-sec: 1800

# 注：本段 degraded-after-sec / ttl-sec / offline-grace-sec / scan-interval-sec 为热改项（首启种子，FR-61），
# 改后需在设置页 / 设置 API 修改才热生效；heartbeat-interval-sec 是启动项（注册时一次性下发）、改后须重启。
health:
  # 下发给 agent 的心跳周期（秒）。启动项：改后须重启
  heartbeat-interval-sec: 10
  # 超过多少秒未收到心跳即判亚健康（online→degraded）；须小于 ttl-sec。热改项首启种子
  degraded-after-sec: 15
  # 超过多少秒未收到心跳即判失联（degraded→lost）。热改项首启种子
  ttl-sec: 30
  # lost 后多久转 offline（秒）。热改项首启种子
  offline-grace-sec: 120
  # 后台健康扫描周期（秒）。热改项首启种子
  scan-interval-sec: 5

# 健康告警：实例进入 degraded/lost/offline 时主动告警，通道可扩展（站内信 + webhook，见 docs/adr/0019）
# 注：webhook.url / webhook.timeout-ms 为热改项（首启种子，FR-61），改后走设置页 / 设置 API 即热生效、免重启；
# inbox-capacity 是启动项（环形缓存容量，进程内固定）、改后须重启。
alert:
  # 站内信保留的最近告警条数（进程内环形缓存，控制面重启清零）。启动项：改后须重启
  inbox-capacity: 200
  # webhook 告警通道
  webhook:
    # 告警 POST 目标 URL；留空则不启用 webhook 通道（仅站内信）。热改项首启种子
    url: ""
    # 单次 webhook 请求超时（毫秒）。热改项首启种子
    timeout-ms: 3000

# 负载指标看板：按间隔对在线实例采样落库形成历史趋势，并按保留期清理过期样本（FR-32，见 docs/adr/0023）
# 注：本段 enabled / sample-interval-sec / retention-hours 全为热改项（首启种子，FR-61），改后走设置页 /
# 设置 API 即热生效——enabled=false 即停采样、间隔改了下一轮即按新周期，免重启。
metric:
  # 是否启用采样器；false 时不采样、不清理（实时聚合端点 /metrics/summary 仍可用）。热改项首启种子
  enabled: true
  # 采样间隔（秒）：每隔多少秒对在线实例采一次样落库。越短样本越密、表增长越快，建议 15~30。热改项首启种子
  sample-interval-sec: 30
  # 保留期（小时）：早于 now 减本值的样本被滚动删除，控制表体量。默认 168（即 7 天）。热改项首启种子
  retention-hours: 168

longpoll:
  # 服务端长轮询挂起上限（毫秒）；实际取 min(客户端 timeoutMs, 此值)。热改项首启种子（FR-61），改后走设置 API 即热生效
  max-hold-ms: 30000

log:
  # 日志级别：ERROR / WARN / INFO / DEBUG。热改项首启种子（FR-61），改后走设置 API 即原子热生效、免重启
  level: "INFO"

# 控制面在线更新（FR-98 起）。当前仅含更新出站代理。
# 注：proxy-url 为热改项（首启种子，FR-61），改后走设置页 / 设置 API 即热生效、免重启。
update:
  # 更新出站代理地址（http://host:port 或 https://...，可含 user:pass）；留空=直连。
  # 仅作用于控制面更新检查 / 下载出站，不影响告警 webhook（webhook 维持直连）。
  # 含凭据时管理台回显 / 审计 / 日志均脱敏，store 落原值仅供运行。热改项首启种子
  proxy-url: ""
