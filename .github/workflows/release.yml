# Beacon 发布工作流（ADR-0007 稳定渠道）：推送 vX.Y.Z tag 时多平台原生构建全部可交付物，
# 生成 SHA256 校验和后发 GitHub Release。
#
# 为什么矩阵原生而非交叉编译：控制面 sqlite 经 go-sqlite3 需 CGO，交叉编译会自动关闭 CGO
# 导致 sqlite 不可用（默认开箱即跑的库）。故各平台二进制在对应原生 runner 上以 CGO=1 构建。
name: Release

on:
  push:
    tags:
      # 仅正式语义化版本 tag 触发（快照/预发布另走 sdd-publish-snapshot）
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  # 创建 Release 并上传附件需要写 contents
  contents: write

jobs:
  # 前端构建一次，作为 artifact 供各平台二进制 go:embed 复用（免每个 runner 重复装 Node 构建）。
  web:
    name: 前端构建
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 校验 tag 与 VERSION 一致
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(cat VERSION)"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag $GITHUB_REF_NAME 与仓库 VERSION($ver) 不一致，拒绝发布"
            exit 1
          fi
      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.32.1"
      - name: 安装 Node（启用 pnpm store 缓存）
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: 构建前端（make web）
        run: make web
      - name: 上传前端产物
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          if-no-files-found: error

  # 各平台原生构建控制面单二进制（CGO=1，sqlite 可用）。go:embed 复用上一步的 web/dist。
  # 直接 go build（非 make build）：矩阵需原生 CGO + 复用预构建前端，且 windows runner 无 make；
  # 链接参数与 Makefile build 目标一致（-trimpath + 注入 version.Version）。
  binaries:
    name: 控制面 ${{ matrix.target }}
    needs: web
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: linux-amd64,   ext: "" }
          - { os: windows-latest, target: windows-amd64, ext: ".exe" }
          - { os: macos-13,       target: darwin-amd64,  ext: "" }
          - { os: macos-14,       target: darwin-arm64,  ext: "" }
    env:
      # 各平台 runner 自带原生 C 工具链（gcc/clang/mingw），sqlite 经 CGO 可用
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: 取回前端产物到 web/dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - name: 原生构建控制面二进制
        shell: bash
        run: |
          ver="$(cat VERSION)"
          out="beacon-${ver}-${{ matrix.target }}${{ matrix.ext }}"
          go build -trimpath -ldflags "-s -w -X beacon/internal/version.Version=${ver}" -o "${out}" ./cmd/beacon
          echo "已构建 ${out}"
      - name: 上传二进制
        uses: actions/upload-artifact@v4
        with:
          name: beacon-${{ matrix.target }}
          path: beacon-*
          if-no-files-found: error

  # 双端 agent 插件 jar（JVM、平台无关，构建一次；gradle 读根 VERSION 注入版本）。
  jars:
    name: agent jar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 JDK21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: 准备 Gradle（含依赖缓存）
        uses: gradle/actions/setup-gradle@v4
      - name: 构建 agent jar（make agent）
        run: make agent
      - name: 上传 jar
        uses: actions/upload-artifact@v4
        with:
          name: beacon-agent-jars
          path: |
            dist/BeaconAgent-*.jar
            dist/BeaconAgentProxy-*.jar
          if-no-files-found: error

  # 汇集全部产物、生成 SHA256 校验和、创建 GitHub Release。
  release:
    name: 发布 GitHub Release
    needs: [binaries, jars]
    runs-on: ubuntu-latest
    steps:
      - name: 汇集全部产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          # 各 job 的 artifact 扁平合并到 artifacts/
          merge-multiple: true
      - name: 生成 SHA256 校验和
        shell: bash
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          echo "==== 发布产物校验和 ===="
          cat SHA256SUMS.txt
      - name: 创建 Release 并上传产物
        uses: softprops/action-gh-release@v2
        with:
          # tag 已存在（由本次 push 触发），自动据 tag 建 Release
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
