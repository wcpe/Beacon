# Beacon 稳定发布触发壳（ADR-0007 稳定渠道）：推送正式语义化版本 tag vX.Y.Z 时，
# 调用可复用 workflow _build-release.yml 做多平台原生构建 + 双端 jar + SHA256 + 建正式 Release。
# 本文件极薄、只管触发与传参；构建逻辑单点维护在 _build-release.yml（FR-103）。
name: Release

on:
  push:
    tags:
      # 仅正式语义化版本 tag 触发（rc 预发布走 prerelease.yml，glob 与此互斥不重叠）
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  # 创建 Release 并上传附件需要写 contents
  contents: write

jobs:
  call:
    name: 稳定发布构建
    uses: ./.github/workflows/_build-release.yml
    permissions:
      contents: write
    with:
      # 稳定渠道：非预发布
      prerelease: false
