# Beacon 持续集成轻量门禁。
# 触发：向 master 的 PR、推送到 master。只跑 PR/push 必过的快速检查
# （控制面构建 + 单测、Go 静态检查、agent 单测、前端构建）。
# 重型 E2E（需 JDK21 + 下载 Paper/Waterfall，约 12 分钟）不在此处，见 e2e.yml。
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# 同一分支新推送自动取消旧的在跑流水线，省 CI 资源。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 控制面（Go）：构建 + 单元测试。
  # sqlite 经 go-sqlite3 需 CGO，ubuntu-latest 自带 gcc，故显式开 CGO。
  go:
    name: 控制面构建与单测
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          # 版本取自仓库根 go.mod 的 go 指令，避免漂移
          go-version-file: go.mod
          cache: true
      - name: 构建全部包
        run: go build ./...
      - name: 运行单元测试
        # 不带 integration/e2e 标记，只跑纯逻辑单测（集成/E2E 各有独立入口）
        run: go test ./...

  # Go 静态检查：golangci-lint（配置见根 .golangci.yml）+ gofmt/goimports 格式校验。
  lint:
    name: Go 静态检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # 版本固定，避免不同机器规则不一致
          version: v1.64.8
      - name: gofmt 格式校验
        # gofmt -l 列出未格式化文件；有输出即判失败
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "以下文件未通过 gofmt 格式化："
            echo "$unformatted"
            exit 1
          fi
      - name: goimports 导入分组校验
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          unsorted=$("$(go env GOPATH)/bin/goimports" -l .)
          if [ -n "$unsorted" ]; then
            echo "以下文件未通过 goimports 导入排序："
            echo "$unsorted"
            exit 1
          fi

  # 数据面 agent（Kotlin/TabooLib）：JDK21 + Gradle wrapper 跑全模块单测。
  agent:
    name: agent 单测
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 JDK21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: 准备 Gradle（含依赖缓存）
        uses: gradle/actions/setup-gradle@v4
      - name: 运行 agent 单测
        # Linux 用 wrapper；-p 指定 agent 子工程根
        run: ./agent/gradlew -p agent test

  # 前端（React/Vite/TS）：经 Makefile 的 web 目标安装依赖 + 构建（构建逻辑与本地一键打包同源）。
  web:
    name: 前端构建
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          # 版本对齐 web/package.json 的 packageManager 字段
          version: "10.32.1"
      - name: 安装 Node（启用 pnpm store 缓存）
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: 构建前端（make web）
        # 构建逻辑单一来源于 Makefile：cd web && pnpm install --frozen-lockfile && pnpm build
        # ubuntu runner 自带 make；从仓库根调用（make web 内部自行 cd web）
        run: make web

  # 一键打包验证 + 产物上传：经 Makefile 完整构建控制面（原生二进制，内嵌前端 + 版本注入）+ 双端 agent jar，
  # 与本地 make package、release.yml 同一构建路径（Makefile 单一来源）。产物上传供 PR/push 后下载验证（临时）。
  package:
    name: 一键打包（make package）
    runs-on: ubuntu-latest
    env:
      # 控制面 sqlite 经 go-sqlite3 需 CGO；ubuntu 自带 gcc
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: 安装 JDK21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: 准备 Gradle（含依赖缓存）
        uses: gradle/actions/setup-gradle@v4
      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.32.1"
      - name: 安装 Node（启用 pnpm store 缓存）
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: 一键打包
        run: make package
      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: beacon-package
          path: dist/
          if-no-files-found: error
          retention-days: 7
