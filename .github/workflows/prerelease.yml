# Beacon rc 预发布触发壳（ADR-0046 预发布渠道）：推送 rc tag vX.Y.Z-rc.N 时，
# 调用可复用 workflow _build-release.yml 做多平台原生构建 + 双端 jar + SHA256 + 建预发布 Release（prerelease=true）。
# 本文件极薄、只管触发与传参；构建逻辑单点维护在 _build-release.yml（FR-103）。
# 只做 rc，不做 beta/nightly（YAGNI）。
name: Prerelease

on:
  push:
    tags:
      # 仅 rc 预发布 tag 触发（严格三段版本号 + -rc.<数字>，与 release.yml 正式三段 glob 互斥不重叠）
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"

permissions:
  # 创建 Release 并上传附件需要写 contents
  contents: write

jobs:
  call:
    name: rc 预发布构建
    uses: ./.github/workflows/_build-release.yml
    permissions:
      contents: write
    with:
      # rc 渠道：标记为预发布
      prerelease: true
