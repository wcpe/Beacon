# Beacon 控制面自身配置样例（非"配置中心"业务配置）。由 internal/config 加载，环境变量覆盖优先。
# 复制为 config.yaml 后按需修改；敏感项（DB 密码、agent token）建议走环境变量，不写入此文件。

# API 与管理台 UI 的监听地址（二者同端口）
http-addr: ":8848"

# agent 端共享 token，仅防误连（非安全边界，语义不变）
agent-token: "change-me"

# 管理面鉴权（FR-11，单操作者模型，见 docs/adr/0009）。口令与密钥为敏感项，走环境变量，勿写入此文件
auth:
  # 管理台操作者用户名
  username: "admin"
  # 管理台操作者口令；留空，经 env BEACON_ADMIN_PASSWORD 注入（缺省启动即失败）
  password: ""
  # 登录令牌 HMAC 签名密钥；留空，经 env BEACON_AUTH_SECRET 注入（缺省启动即失败）
  secret: ""
  # 登录令牌有效期（秒），默认 86400（一天）
  token-ttl-sec: 86400

database:
  # GORM DSN；切 Postgres 时改 driver 与此串，业务代码零改。必须带 parseTime=true&loc=UTC
  dsn: "root:beacon@tcp(127.0.0.1:3306)/beacon?charset=utf8mb4&parseTime=true&loc=UTC"
  # 连接池最大打开连接数
  max-open-conns: 20
  # 连接池最大空闲连接数
  max-idle-conns: 10
  # 单个连接最大存活秒数
  conn-max-lifetime-sec: 1800

health:
  # 下发给 agent 的心跳周期（秒）
  heartbeat-interval-sec: 10
  # 超过多少秒未收到心跳即判失联（online→lost）
  ttl-sec: 30
  # lost 后多久转 offline（秒）
  offline-grace-sec: 120
  # 后台健康扫描周期（秒）
  scan-interval-sec: 5

longpoll:
  # 服务端长轮询挂起上限（毫秒）；实际取 min(客户端 timeoutMs, 此值)
  max-hold-ms: 30000

log:
  # 日志级别：ERROR / WARN / INFO / DEBUG
  level: "INFO"
